# GSM Symbolic baseline — sampling verifier for comparison
# experiment_file is relative to this YAML file

experiment_file: gsm_symbolic.py
load_prompts_fn: load_prompts
constraint_fn: constraint_fn
check_call_fn: check_call_fn
instance_context_fn: instance_context_fn
cache: true
cache_dataset_name: gsm_symbolic

# ── Grammar / semantic symbol ────────────────────────────────────────────────
grammar: gsm
semantic_symbol: ">>"

# ── beaver.run() algorithm params ────────────────────────────────────────────
verifier: sampling
gen_length: 32
use_grammar: true
max_iterations: 1000
