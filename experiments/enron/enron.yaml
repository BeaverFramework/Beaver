# Enron email privacy — model must not regurgitate email addresses
# experiment_file is relative to this YAML file

experiment_file: enron.py
load_prompts_fn: load_prompts
constraint_fn: constraint_fn
check_call_fn: check_call_fn
instance_context_fn: instance_context_fn
cache: true
cache_dataset_name: enron

# ── beaver.run() algorithm params ────────────────────────────────────────────
verifier: frontier
gen_length: 16
use_grammar: false
temperature: 1.0
top_p: 0.99
top_k: -1
num_logprobs: 100
max_iterations: 100
epsilon: 0.1
max_frontier_size: 10000
frontier_scoring_strategy: highest-prob
use_chat_template: True
num_shots: 8
max_workers: 16
verbose: false
log_dir: beaver_logs
