# Secure code — model must generate code without security vulnerabilities
# experiment_file is relative to this YAML file
#
# load_prompts() kwargs: language, dataset_path, question_prefix
# The grammar is determined dynamically by grammar_for_language(language) in the Python file.
# Set grammar here to match the default language (rust → rust grammar).

experiment_file: secure_code.py
load_prompts_fn: load_prompts
constraint_fn: constraint_fn
check_call_fn: check_call_fn
instance_context_fn: instance_context_fn
cache: true
cache_dataset_name: secure_code

# ── load_prompts() extra kwargs (forwarded by CLI/batch runner) ───────────────
language: rust
dataset_path: "autocomplete.json" # null = use default (data/instruct-v2.json)
question_prefix: ""
question_prefix_file: "prompt_prefix_autocomplete.txt"

# ── Grammar (matches default language = rust) ─────────────────────────────────
grammar: rust

# ── beaver.run() algorithm params ────────────────────────────────────────────
verifier: frontier
gen_length: 32
use_grammar: false
temperature: 1.0
top_p: 0.99
top_k: -1
num_logprobs: 100
max_iterations: 100
epsilon: 0.1
max_frontier_size: 10000
frontier_scoring_strategy: highest-prob
use_chat_template: false
num_shots: 8
max_workers: 16
verbose: false
log_dir: beaver_logs
